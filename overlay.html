<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alert Overlay</title>
<style>
body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#alert-container {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 10px #000;
    opacity: 0;
    transition: opacity 0.5s, transform 0.5s;
}
</style>
</head>
<body>
<div id="alert-container"></div>

<script>
async function poll() {
    try {
        const res = await fetch("/latest");
        const data = await res.json();
        if(data.message) {
            const container = document.getElementById("alert-container");
            container.innerText = data.message;
            container.style.color = data.color || "white";
            container.style.opacity = 1;
            container.style.transform = "translateX(-50%) translateY(0px)";
            setTimeout(() => {
                container.style.opacity = 0;
                container.style.transform = "translateX(-50%) translateY(-30px)";
            }, 3000);
        }
    } catch(e) {
        console.error(e);
    }
    setTimeout(poll, 500);
}

poll();
</script>
</body>
</html>
