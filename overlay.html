<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Transparent Combined Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100dvh;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* OVERLAYS */
.overlay-container {
  position: absolute;
  inset: 0;
}

.overlay-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  pointer-events: none;
  object-fit: contain;
}

#overlay1 { z-index: 1; }
#overlay2 { z-index: 2; }
#overlay3 { z-index: 3; }

/* ALERTS */
#alert-container {
  position: absolute;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(16px, 4vw, 28px);
  font-weight: bold;
  text-shadow: 2px 2px 12px #000;
  opacity: 0;
  transition: all 0.5s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: none;
  z-index: 9998;
  width: 90%;
  text-align: center;
  justify-content: center;
}

#alert-container img {
  width: clamp(30px, 6vw, 50px);
  height: clamp(30px, 6vw, 50px);
}

.show {
  opacity: 1 !important;
  transform: translateX(-50%) translateY(0px) !important;
}

.hide {
  opacity: 0 !important;
  transform: translateX(-50%) translateY(-40px) !important;
}

/* 🔥 SSN DOCK (TOP LEFT + RESPONSIVE) */
#ssn-dock {
  position: fixed;
  top: env(safe-area-inset-top, 10px);
  left: env(safe-area-inset-left, 10px);

  width: clamp(110px, 22vw, 180px);
  height: clamp(140px, 28vh, 220px);

  border: none;
  background: transparent;
  z-index: 9999;
  pointer-events: auto;
}

/* Optional: scale down for very small screens */
@media (max-width: 400px) {
  #ssn-dock {
    width: 100px;
    height: 130px;
  }
}
</style>
</head>

<body>

<!-- OVERLAYS -->
<div class="overlay-container">
  <iframe id="overlay1" src="https://streamelements.com/overlay/686232c233ab63d506f91b19/Ym8L0KU1TcSCBxUzyVUZ9gir3OSOcEuDsSm2zfXK2rh7SfUV"></iframe>
  <iframe id="overlay2" src="https://streamelements.com/overlay/69b9e278a4697ca2e0a315c7/tdo8ja1UfrzRL_nQsipY8eoDRlTHGqxuuP77ulwg18uLrKt_"></iframe>
  <iframe id="overlay3" src="https://streamelements.com/overlay/6862341c9e6035d94bc01376/Vw55jQwWH0pCYMhpTtwjuozcBDL9ERoUwobSKnEcZHrs3wDT"></iframe>
</div>

<!-- ALERTS -->
<div id="alert-container">
  <img id="alert-gif" src="" style="display:none;">
  <span id="alert-text"></span>
</div>
<audio id="alert-sound"></audio>

<!-- 🔥 SSN DOCK -->
<iframe 
  id="ssn-dock"
  src="https://socialstream.ninja/dock.html?session=cxbfKsNRwF&password=false&savesingle&noavatar&transparent&chatonly&hidemenu">
</iframe>

<script>
const ALERT_DURATION = 4000;

const container = document.getElementById("alert-container");
const text = document.getElementById("alert-text");
const gif = document.getElementById("alert-gif");
const sound = document.getElementById("alert-sound");

const evtSource = new EventSource("/stream");

evtSource.onmessage = (event) => {
    let data;
    try { data = JSON.parse(event.data); } catch { return; }
    if (!data.message) return;
    showAlert(data);
};

function showAlert(data) {
    const msg = data.message.toLowerCase();
    text.innerText = data.message;
    container.style.color = data.color || "white";

    gif.style.display = "none";
    gif.src = "";
    sound.pause();
    sound.currentTime = 0;

    if (msg.includes("follow")) {
        gif.src = "/static/follow.gif";
        sound.src = "/static/follow.mp3";
    } else if (msg.includes("sub")) {
        gif.src = "/static/sub.gif";
        sound.src = "/static/sub.mp3";
    } else if (msg.includes("gift") || msg.includes("donate")) {
        gif.src = "/static/donation.gif";
        sound.src = "/static/donation.mp3";
    }

    if (gif.src) gif.style.display = "block";
    if (sound.src) sound.play().catch(() => {});

    container.classList.remove("hide");
    container.classList.add("show");

    setTimeout(() => {
        container.classList.remove("show");
        container.classList.add("hide");
    }, ALERT_DURATION);
}
</script>

</body>
</html>
}
</script>

</body>
</html>
